<!-- Created with Claude -->
<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR Lyd - Recycled</title>
    <link rel="icon" href="/assets/icon-recycle.svg">
    <link rel="stylesheet" href="shared.css">

    <!-- Apply saved theme before first paint to avoid flash -->
    <script>
      (function () {
        var m = document.cookie.match(/(?:^|;\s*)theme=(dark|light)/);
        if (m) document.documentElement.setAttribute('data-theme', m[1]);
      })();
    </script>

    <style>
      /* index.html only: wider max-width and podcast grid */
      .header-inner { max-width: 1400px; }
      main {
        max-width: 1400px;
        margin: 1.5rem auto;
        padding: 0 1rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 1rem;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        transition: border-color 0.2s, transform 0.15s;
        display: flex;
        flex-direction: column;
      }
      .card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .card a {
        display: flex;
        flex-direction: column;
        height: 100%;
        text-decoration: none;
        color: inherit;
      }

      .card-img-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        background: #111;
      }
      .card-img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.3s;
      }
      .card:hover .card-img-wrap img { transform: scale(1.04); }

      .badge {
        position: absolute;
        top: 6px;
        right: 6px;
        background: rgba(0,0,0,0.75);
        color: #fff;
        font-size: 0.7rem;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 10px;
        line-height: 1.4;
        backdrop-filter: blur(4px);
      }

      .card-body { padding: 0.5rem 0.6rem; flex: 1; }
      .card-body h2 {
        font-size: 0.78rem;
        font-weight: 600;
        line-height: 1.3;
        color: var(--text);
      }

      footer { max-width: none; }

      @media (max-width: 480px) {
        .grid {
          grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
          gap: 0.75rem;
        }
      }
    </style>
  </head>
  <body>

  <header>
    <div class="header-inner">
      <a class="logo-link" href="https://www.dr.dk/lyd" title="DR Lyd" target="_blank" rel="noopener">
        <img src="/assets/icon-logo-drlyd.svg" alt="DR Lyd">
      </a>

      <div class="header-title">
        <h1>DR Lyd</h1>
        <p>Recycled</p>
      </div>

      <button class="theme-toggle" id="theme-toggle" title="Skift farvetema" aria-label="Skift farvetema">
        <span class="icon-to-dark"  aria-hidden="true">🌙</span>
        <span class="icon-to-light" aria-hidden="true">☀️</span>
      </button>

      <a class="logo-link" href="https://github.com/briped/briped.github.io" title="GitHub" target="_blank" rel="noopener">
        <img src="/assets/icon-logo-github-auto.svg" alt="GitHub">
      </a>
    </div>
  </header>

  <main>
    <div class="grid" id="podcast-grid">
      <!-- Populated by JavaScript -->
    </div>
  </main>

  <footer>
    <span id="last-updated"></span>
  </footer>

  <script>
    // ── Theme toggle ────────────────────────────────────────────
    (function () {
      var btn = document.getElementById('theme-toggle');
      btn.addEventListener('click', function () {
        var html    = document.documentElement;
        var current = html.getAttribute('data-theme');
        // If no explicit theme set yet, derive current from system
        if (!current) {
          current = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        // Persist for 1 year; SameSite=Lax is safe for same-origin navigation
        document.cookie = 'theme=' + next + '; path=/; max-age=31536000; SameSite=Lax';
      });
    })();

    // ── Podcast grid ────────────────────────────────────────────
    var grid = document.getElementById('podcast-grid');

    fetch('podcasts.json')
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(function (data) {
        data.podcasts.forEach(function (p) {
          var card = document.createElement('div');
          card.className = 'card';
          card.innerHTML =
            '<a href="feed.html?podcast=' + encodeURIComponent('feed/' + p.xml) + '">' +
              '<div class="card-img-wrap">' +
                '<img src="' + p.cover + '" alt="' + p.title + '" loading="lazy" decoding="async">' +
                '<span class="badge">' + p.episodes + '</span>' +
              '</div>' +
              '<div class="card-body"><h2>' + p.title + '</h2></div>' +
            '</a>';
          grid.appendChild(card);
        });

        var ts = new Date(data.lastUpdated).toLocaleString('da-DK', {
          timeZone: 'Europe/Copenhagen',
          dateStyle: 'medium',
          timeStyle: 'short'
        });
        document.getElementById('last-updated').textContent = 'Sidst opdateret: ' + ts;
      })
      .catch(function (err) {
        grid.innerHTML = '<p style="color:var(--text-muted);padding:2rem">Kunne ikke hente podcast-liste. (' + err.message + ')</p>';
      });
  </script>

  </body>
</html>

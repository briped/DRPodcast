<!-- Created with Claude -->
<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Feed &mdash; DR Lyd Recycled</title>
    <link rel="icon" href="/assets/icon-recycle.svg">
    <link rel="stylesheet" href="shared.css">

    <!-- Apply saved theme before first paint to avoid flash -->
    <script>
      (function () {
        var m = document.cookie.match(/(?:^|;\s*)theme=(dark|light)/);
        if (m) document.documentElement.setAttribute('data-theme', m[1]);
      })();
    </script>

    <style>
      /* feed.html only: description clamp + toggle, loading/error states,
         JS-driven episode expand/collapse */
      .podcast-info .description {
        display: -webkit-box;
        -webkit-line-clamp: 5;
        line-clamp: 5;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .podcast-info .description.expanded {
        -webkit-line-clamp: unset;
        line-clamp: unset;
      }
      .toggle-desc {
        background: none;
        border: none;
        color: var(--accent);
        cursor: pointer;
        font-size: 0.8rem;
        padding: 0;
        margin-bottom: 1rem;
        display: none;
      }
      .toggle-desc:hover { color: var(--accent-hv); }

      .episode-chevron { transition: transform 0.2s; }
      .episode.open .episode-chevron { transform: rotate(180deg); }
      .episode-body { display: none; }
      .episode.open .episode-body { display: block; }

      .state-msg {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--text-muted);
        font-size: 0.9rem;
      }
      .state-msg.error { color: var(--accent-hv); }
    </style>
  </head>
  <body>

  <header>
    <div class="header-inner">
      <a class="logo-link" href="https://www.dr.dk/lyd" title="DR Lyd" target="_blank" rel="noopener">
        <img src="/assets/icon-logo-drlyd.svg" alt="DR Lyd">
      </a>

      <div class="header-title">
        <h1>DR Lyd</h1>
        <p>Recycled</p>
      </div>

      <button class="theme-toggle" id="theme-toggle" title="Skift farvetema" aria-label="Skift farvetema">
        <span class="icon-to-dark"  aria-hidden="true">🌙</span>
        <span class="icon-to-light" aria-hidden="true">☀️</span>
      </button>

      <a class="back-link" href="./">← Alle podcasts</a>
    </div>
  </header>

  <main>
    <div id="loading" class="state-msg">Henter feed…</div>
    <div id="error"   class="state-msg error" hidden></div>

    <div id="podcast-hero"  class="podcast-hero"  hidden></div>
    <div id="subscribe-bar" class="subscribe-bar" hidden></div>

    <p class="section-heading" id="episode-heading" hidden></p>
    <div id="episode-list" class="episode-list"></div>
  </main>

  <footer>
    <a href="/">DR Lyd &mdash; Recycled</a>
  </footer>

  <script>
  (function () {
    'use strict';

    // ── Theme toggle ──────────────────────────────────────────
    document.getElementById('theme-toggle').addEventListener('click', function () {
      var html    = document.documentElement;
      var current = html.getAttribute('data-theme');
      if (!current) {
        current = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      var next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      document.cookie = 'theme=' + next + '; path=/; max-age=31536000; SameSite=Lax';
    });

    // ── Feed loader ───────────────────────────────────────────
    var params  = new URLSearchParams(location.search);
    var podcast = params.get('podcast');

    if (!podcast) {
      showError('Intet podcast angivet. Gå <a href="/">tilbage</a>.');
      return;
    }

    var feedUrl = new URL(podcast, location.href).href;
    fetchFeed(feedUrl);

    async function fetchFeed(url) {
      try {
        var resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        var text   = await resp.text();
        var parser = new DOMParser();
        var xml    = parser.parseFromString(text, 'application/xml');
        if (xml.querySelector('parsererror')) throw new Error('Ugyldig XML');
        render(xml, url);
      } catch (err) {
        showError('Kunne ikke hente feed.<br><small>' + err.message + '</small>');
      }
    }

    function render(xml, feedUrl) {
      var channel = xml.querySelector('channel');
      if (!channel) { showError('Ugyldigt RSS-format.'); return; }

      var t = function (sel, ctx) {
        var el = (ctx || channel).querySelector(sel);
        return el ? (el.textContent || '').trim() : '';
      };
      var attr = function (sel, at, ctx) {
        var el = (ctx || channel).querySelector(sel);
        return el ? (el.getAttribute(at) || '') : '';
      };

      var title = t('title');
      var desc  = t('description');
      var cover = attr('image', 'href') || attr('image url') || (function () {
        var img = channel.querySelector('image');
        return img ? t('url', img) : '';
      })();
      var link  = t('link');

      document.title = title + ' \u2014 DR Lyd Recycled';

      var hero = document.getElementById('podcast-hero');
      hero.innerHTML =
        '<div class="podcast-cover">' +
          '<img src="' + esc(cover) + '" alt="' + esc(title) + '" id="podcast-img">' +
        '</div>' +
        '<div class="podcast-info">' +
          '<h2 id="podcast-title">' + esc(title) + '</h2>' +
          '<p class="description" id="podcast-desc">' + esc(desc) + '</p>' +
          '<button class="toggle-desc" id="toggle-desc" aria-expanded="false">Vis mere</button>' +
        '</div>';
      hero.hidden = false;

      requestAnimationFrame(function () {
        var descEl = document.getElementById('podcast-desc');
        var toggle = document.getElementById('toggle-desc');
        if (descEl.scrollHeight > descEl.clientHeight + 2) {
          toggle.style.display = 'inline';
          toggle.addEventListener('click', function () {
            var open = toggle.getAttribute('aria-expanded') === 'true';
            descEl.classList.toggle('expanded', !open);
            toggle.setAttribute('aria-expanded', String(!open));
            toggle.textContent = open ? 'Vis mere' : 'Vis mindre';
          });
        }
      });

      var subBar = document.getElementById('subscribe-bar');
      var feedU  = new URL(feedUrl);
      subBar.innerHTML =
        '<span>Abonner:</span>' +
        '<a class="subscribe-btn" href="podcast://' + feedU.host + feedU.pathname + '" title="\xC5bn i podcast-app">' +
          '\uD83C\uDF99 Podcast-app' +
        '</a>' +
        '<a class="subscribe-btn outline" href="' + esc(feedUrl) + '" title="RSS-feed" target="_blank" rel="noopener">RSS</a>' +
        (link ? '<a class="subscribe-btn outline" href="' + esc(link) + '" title="DR Lyd" target="_blank" rel="noopener">DR Lyd</a>' : '');
      subBar.hidden = false;

      var items   = Array.from(xml.querySelectorAll('item'));
      var heading = document.getElementById('episode-heading');
      heading.textContent = items.length + ' episode' + (items.length !== 1 ? 'r' : '');
      heading.hidden = false;

      var list = document.getElementById('episode-list');
      list.innerHTML = '';

      items.forEach(function (item) {
        var etitle   = t('title', item);
        var edesc    = t('description', item);
        var epubDate = t('pubDate', item);
        var edur     = t('duration', item) || '';
        var encUrl   = attr('enclosure', 'url', item);
        var encType  = attr('enclosure', 'type', item) || 'audio/mpeg';
        var dateStr  = epubDate ? formatDate(epubDate) : '';
        var durStr   = edur     ? formatDuration(edur)  : '';

        var ep = document.createElement('div');
        ep.className = 'episode';
        ep.innerHTML =
          '<div class="episode-header" role="button" tabindex="0" aria-expanded="false">' +
            '<span class="episode-title">'  + esc(etitle) + '</span>' +
            '<span class="episode-meta">'  +
              (dateStr ? '<span class="episode-date">'     + dateStr + '</span>' : '') +
              (durStr  ? '<span class="episode-duration">' + durStr  + '</span>' : '') +
            '</span>' +
            '<span class="episode-chevron" aria-hidden="true">\u25BC</span>' +
          '</div>' +
          '<div class="episode-body">' +
            (edesc  ? '<div class="episode-description">' + sanitiseHtml(edesc) + '</div>' : '') +
            (encUrl ? '<audio class="episode-player" controls preload="none" src="' + esc(encUrl) + '" type="' + esc(encType) + '">Din browser underst\xF8tter ikke HTML5-lyd.</audio>' : '') +
          '</div>';

        var header = ep.querySelector('.episode-header');
        header.addEventListener('click', function () { toggleEpisode(ep, header); });
        header.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleEpisode(ep, header); }
        });

        list.appendChild(ep);
      });

      document.getElementById('loading').hidden = true;
    }

    function toggleEpisode(ep, header) {
      var open = ep.classList.toggle('open');
      header.setAttribute('aria-expanded', String(open));
      if (open) {
        document.querySelectorAll('.episode.open audio').forEach(function (audio) {
          if (!ep.contains(audio)) audio.pause();
        });
      }
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function sanitiseHtml(html) {
      var tmp = document.createElement('div');
      tmp.innerHTML = html;
      tmp.querySelectorAll('script, iframe, object, embed').forEach(function (el) { el.remove(); });
      return tmp.innerHTML;
    }

    function formatDate(str) {
      try {
        var d = new Date(str);
        if (isNaN(d)) return str;
        return d.toLocaleDateString('da-DK', { day: 'numeric', month: 'short', year: 'numeric' });
      } catch (e) { return str; }
    }

    function formatDuration(str) {
      if (/^\d+$/.test(str)) {
        var s   = parseInt(str, 10);
        var h   = Math.floor(s / 3600);
        var m   = Math.floor((s % 3600) / 60);
        var sec = s % 60;
        return h > 0 ? h + ':' + pad(m) + ':' + pad(sec) : m + ':' + pad(sec);
      }
      return str;
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    function showError(msg) {
      document.getElementById('loading').hidden = true;
      var err = document.getElementById('error');
      err.innerHTML = msg;
      err.hidden = false;
    }
  })();
  </script>
  </body>
</html>

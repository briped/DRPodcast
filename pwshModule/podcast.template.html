<!DOCTYPE html>
<html lang="da">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DR Lyd - Recycled</title>
        <link rel="icon" href="/assets/icon-recycle.svg">
        <link rel="stylesheet" href="/stylesheet.css">
    </head>
    <body>
        <header>
            <a href="https://www.dr.dk/lyd" target="_blank"><img class="logo drlyd" src="/assets/icon-logo-drlyd.svg" alt="DR Lyd - Recycled"/></a>
            <div class="title">
                <h1>DR Lyd</h1>
                <h2>Recycled</h2>
            </div>
            <a href="https://github.com/briped/briped.github.io" target="_blank"><img class="logo github" src="/assets/icon-logo-github-auto.svg" alt="Github"/></a>
        </header>
        <main>
            <div class="grid">
                {{#podcasts}}
                <div class="podcast" title="{{title}} - {{numberOfEpisodes}} episoder">
                    <div class="cover">
                        <a href="{{rssUri}}"><img src="{{feedCoverUri}}" alt="{{title}}"></a>
                        <a href="{{rssUri}}"><div class="icon-rss"></div></a>
                        <a href="{{presentationUrl}}" target="_blank"><div class="icon-logo-drlyd"></div></a>
                        <div class="episodes">{{numberOfEpisodes}}</div>
                    </div>
                    <div class="name">{{title}}</div>
                </div>
                {{/podcasts}}
            </div>
        </main>
        <footer>
            <p>Last updated: {{lastUpdated}}</p>
        </footer>
    </body>
</html>
